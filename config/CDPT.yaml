model_name: CDPT

# Data Config
train_data_path:
val_data_path:
teacher_model_path:
# Distillation training: path to teacher ckpt (same CDPT-style architecture, e.g., historical VBD weights); for inference set `use_teacher: false` or use `CDPT.load_for_inference`.
teacher_checkpoint_path:
use_teacher: true
save_teacher_in_checkpoint: true
anchor_path: ./CDPT/data/cluster_64_center_dict.pkl
log_dir: ./train_log


# Wandb Config
use_wandb: False
username: null
project: null

# Checkpoint Config
init_from:

# Model Config
agents_len: 32
future_len: 80
action_len: 2
encoder_layers: 6
prediction_type: sample
encoder_version: v2 # v1: GRU, v2: MLP

# Diffusion Params
diffusion_steps: 50
schedule_type: cosine
schedule_s: 0
schedule_e: 1
schedule_tau: 1

action_mean: [0.0, 0.0]
action_std: [1.0, 0.15]
clamp_value: 5.0

# Training Params
seed: 42
batch_size: 2
num_workers: 8
lr: 0.0002
weight_decay: 0.01
epochs: 16
lr_warmup_step: 1000
lr_step_freq: 1000
lr_step_gamma: 0.98

train_encoder: True
train_denoiser: True
train_predictor: True

# Knowledge Distillation Parameters
distill_weight_start: 0.8
distill_weight_end: 0.2
anneal_steps: 40000